name: Release

# Automated release pipeline using Release Please.
#
# How it works:
#   1. You merge PRs to main with conventional commits (feat:, fix:, etc.)
#   2. Release Please automatically creates/updates a "Release PR"
#   3. The Release PR shows the changelog, version bump, and what's included
#   4. You review it, optionally add custom notes, then merge
#   5. On merge: tag created → GitHub Release published → WASM built + attached
#
# Version bumps (automatic):
#   feat:              → minor (0.1.0 → 0.2.0)
#   fix:               → patch (0.1.0 → 0.1.1)
#   feat!: or fix!:    → major (0.1.0 → 1.0.0)
#   BREAKING CHANGE:   → major (in commit body)
#
# Pre-releases:
#   Merge to a release branch (e.g., release/1.0) for pre-release versions
#
# Manual notes:
#   Edit the Release PR body before merging to add custom highlights

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Step 1: Release Please creates/updates the Release PR ──────
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Step 2: Build WASM + attach to release (only on new release) ──
  build-artifacts:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stellar-cli
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/releases/download/v25.2.0/stellar-cli-25.2.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown,wasm32v1-none

      - name: Build optimized WASM contracts
        run: stellar contract build

      - name: Generate contract size table
        id: sizes
        run: |
          TABLE="| Contract | Size |"
          TABLE="${TABLE}\n|----------|------|"
          for wasm in target/wasm32v1-none/release/*.wasm; do
            [ -f "$wasm" ] || continue
            NAME=$(basename "$wasm" .wasm)
            BYTES=$(wc -c < "$wasm" | xargs)
            SIZE=$(awk "BEGIN {printf \"%.2f KB\", $BYTES / 1024}")
            TABLE="${TABLE}\n| ${NAME} | ${SIZE} |"
          done

          echo "table<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$TABLE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Append contract info to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          CURRENT_BODY=$(gh release view "$TAG" --json body -q '.body')

          EXTRA="\n\n## Contract Binaries\n\n"
          EXTRA="${EXTRA}${{ steps.sizes.outputs.table }}\n\n"
          EXTRA="${EXTRA}Deploy to Stellar testnet:\n"
          EXTRA="${EXTRA}\`\`\`bash\n"
          EXTRA="${EXTRA}stellar contract deploy --wasm <contract>.wasm --network testnet --source <identity>\n"
          EXTRA="${EXTRA}\`\`\`"

          echo -e "${CURRENT_BODY}${EXTRA}" > /tmp/release_body.md
          gh release edit "$TAG" --notes-file /tmp/release_body.md

      - name: Upload WASM binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          for wasm in target/wasm32v1-none/release/*.wasm; do
            [ -f "$wasm" ] || continue
            gh release upload "$TAG" "$wasm" --clobber
          done
